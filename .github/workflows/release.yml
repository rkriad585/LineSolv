name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get-version
        run: echo "version=$(cat .version)" >> $GITHUB_OUTPUT

  release:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        id: create_release
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Creating release for version: ${VERSION}"
          gh release create "${VERSION}" \
            --target "${{ github.sha }}" \
            --title "LineSolv ${VERSION}" \
            --generate-notes \
            --draft=false \
            --prerelease=false
          echo "Release created successfully"
          gh release view "${VERSION}" --json url,tagName
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  linux:
    needs: [version, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build
        run: wails build -tags "webkit2_41" -ldflags "-X main.version=${{ needs.version.outputs.version }}"
      - name: Verify binary
        run: |
          echo "Build output:"
          ls -la build/bin/ || true
          test -f build/bin/LineSolv || { echo "Binary not found"; exit 1; }
      - name: Package .deb
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          DEB_VERSION="${VERSION#v}"
          PKG="linesolv_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/bin" "${PKG}/usr/share/applications" "${PKG}/usr/share/icons/hicolor/256x256/apps"
          cp build/bin/LineSolv "${PKG}/usr/bin/linesolv"
          cp build/appicon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/linesolv.png"
          cat > "${PKG}/DEBIAN/control" <<ENDCTRL
          Package: linesolv
          Version: ${DEB_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0, libc6
          Maintainer: rkriad585 <rkriad585@gmail.com>
          Description: Natural-language desktop calculator
           LineSolv is a cross-platform desktop calculator that understands
           natural language input, supports unit conversion, variables,
           and community plugins.
          ENDCTRL
          cat > "${PKG}/usr/share/applications/linesolv.desktop" <<ENDDESK
          [Desktop Entry]
          Type=Application
          Name=LineSolv
          Exec=linesolv
          Icon=linesolv
          Categories=Utility;Calculator;
          Terminal=false
          ENDDESK
          dpkg-deb --build "${PKG}"
          mv "${PKG}.deb" "linesolv-${VERSION}-linux-amd64.deb"
      - name: Prepare binary for self-update
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          cp build/bin/LineSolv "LineSolv-${VERSION}-linux-amd64"
          chmod +x "LineSolv-${VERSION}-linux-amd64"
      - name: Generate checksums
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sha256sum "linesolv-${VERSION}-linux-amd64.deb" "LineSolv-${VERSION}-linux-amd64" > "SHA256SUMS-linux-${VERSION}"
      - name: Upload
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Uploading Linux artifacts..."
          ls -la "linesolv-${VERSION}-linux-amd64.deb" "LineSolv-${VERSION}-linux-amd64" "SHA256SUMS-linux-${VERSION}"
          gh release upload "${VERSION}" \
            "linesolv-${VERSION}-linux-amd64.deb" \
            "LineSolv-${VERSION}-linux-amd64" \
            "SHA256SUMS-linux-${VERSION}" \
            --clobber
          echo "Linux upload complete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    needs: [version, release]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build arm64
        run: GOARCH=arm64 wails build -ldflags "-X main.version=${{ needs.version.outputs.version }}"
      - name: Debug arm64 build output
        run: |
          echo "Build output after arm64 build:"
          ls -la build/bin/ || true
          if [ -d build/bin/LineSolv.app ]; then
            echo "Found .app bundle:"
            ls -la build/bin/LineSolv.app/Contents/MacOS/ || true
          fi
      - name: Verify arm64 binary
        run: |
          if [ -d build/bin/LineSolv.app ]; then
            test -f build/bin/LineSolv.app/Contents/MacOS/LineSolv
          else
            test -f build/bin/LineSolv
          fi
      - name: Package arm64 .app
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          PLIST_VERSION="${VERSION#v}"
          APP="LineSolv-arm64.app"; rm -rf "${APP}"
          if [ -d build/bin/LineSolv.app ]; then
            cp -R build/bin/LineSolv.app "${APP}"
          else
            mkdir -p "${APP}/Contents/MacOS"
            cp build/bin/LineSolv "${APP}/Contents/MacOS/LineSolv"
          fi
          cat > "${APP}/Contents/Info.plist" <<ENDPLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleName</key><string>LineSolv</string>
            <key>CFBundleExecutable</key><string>LineSolv</string>
            <key>CFBundleIdentifier</key><string>com.linesolv.app</string>
            <key>CFBundleVersion</key><string>${PLIST_VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${PLIST_VERSION}</string>
            <key>CFBundleIconFile</key><string>iconfile</string>
            <key>LSMinimumSystemVersion</key><string>10.13.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSHumanReadableCopyright</key><string>LineSolv (c) 2026 rkriad585</string>
          </dict>
          </plist>
          ENDPLIST
          mkdir -p "${APP}/Contents/Resources"
          cp build/appicon.png "${APP}/Contents/Resources/iconfile.png"
      - name: Create arm64 DMG
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          hdiutil create -volname "LineSolv" -srcfolder LineSolv-arm64.app -ov -format UDZO "LineSolv-${VERSION}-darwin-arm64.dmg"
      - name: Prepare arm64 binary for self-update
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          if [ -d LineSolv-arm64.app ]; then
            cp LineSolv-arm64.app/Contents/MacOS/LineSolv "LineSolv-${VERSION}-darwin-arm64"
          else
            cp build/bin/LineSolv "LineSolv-${VERSION}-darwin-arm64"
          fi
          chmod +x "LineSolv-${VERSION}-darwin-arm64"
      - name: Build amd64 (cross-compile)
        run: GOARCH=amd64 wails build -ldflags "-X main.version=${{ needs.version.outputs.version }}"
      - name: Debug amd64 build output
        run: |
          echo "Build output after amd64 cross-compile:"
          ls -la build/bin/ || true
          if [ -d build/bin/LineSolv.app ]; then
            echo "Found .app bundle:"
            ls -la build/bin/LineSolv.app/Contents/MacOS/ || true
          fi
      - name: Package amd64 .app
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          PLIST_VERSION="${VERSION#v}"
          APP="LineSolv-amd64.app"; rm -rf "${APP}"
          if [ -d build/bin/LineSolv.app ]; then
            cp -R build/bin/LineSolv.app "${APP}"
          else
            mkdir -p "${APP}/Contents/MacOS"
            cp build/bin/LineSolv "${APP}/Contents/MacOS/LineSolv"
          fi
          cat > "${APP}/Contents/Info.plist" <<ENDPLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleName</key><string>LineSolv</string>
            <key>CFBundleExecutable</key><string>LineSolv</string>
            <key>CFBundleIdentifier</key><string>com.linesolv.app</string>
            <key>CFBundleVersion</key><string>${PLIST_VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${PLIST_VERSION}</string>
            <key>CFBundleIconFile</key><string>iconfile</string>
            <key>LSMinimumSystemVersion</key><string>10.13.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSHumanReadableCopyright</key><string>LineSolv (c) 2026 rkriad585</string>
          </dict>
          </plist>
          ENDPLIST
          mkdir -p "${APP}/Contents/Resources"
          cp build/appicon.png "${APP}/Contents/Resources/iconfile.png"
      - name: Create amd64 DMG
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          hdiutil create -volname "LineSolv" -srcfolder LineSolv-amd64.app -ov -format UDZO "LineSolv-${VERSION}-darwin-amd64.dmg"
      - name: Prepare amd64 binary for self-update
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          if [ -d LineSolv-amd64.app ]; then
            cp LineSolv-amd64.app/Contents/MacOS/LineSolv "LineSolv-${VERSION}-darwin-amd64"
          elif [ -f build/bin/LineSolv ]; then
            cp build/bin/LineSolv "LineSolv-${VERSION}-darwin-amd64"
          else
            echo "Error: LineSolv binary not found in expected locations"
            echo "Build output:"
            ls -la build/bin/ || true
            exit 1
          fi
          chmod +x "LineSolv-${VERSION}-darwin-amd64"
      - name: Generate checksums
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          shasum -a 256 "LineSolv-${VERSION}-darwin-arm64.dmg" "LineSolv-${VERSION}-darwin-arm64" "LineSolv-${VERSION}-darwin-amd64.dmg" "LineSolv-${VERSION}-darwin-amd64" > "SHA256SUMS-darwin-${VERSION}"
      - name: Upload
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Uploading macOS artifacts..."
          ls -la "LineSolv-${VERSION}-darwin-arm64.dmg" "LineSolv-${VERSION}-darwin-arm64" "LineSolv-${VERSION}-darwin-amd64.dmg" "LineSolv-${VERSION}-darwin-amd64" "SHA256SUMS-darwin-${VERSION}"
          gh release upload "${VERSION}" \
            "LineSolv-${VERSION}-darwin-arm64.dmg" \
            "LineSolv-${VERSION}-darwin-arm64" \
            "LineSolv-${VERSION}-darwin-amd64.dmg" \
            "LineSolv-${VERSION}-darwin-amd64" \
            "SHA256SUMS-darwin-${VERSION}" \
            --clobber
          echo "macOS upload complete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    needs: [version, release]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build + NSIS installer
        shell: bash
        run: GOOS=windows GOARCH=amd64 wails build -nsis -webview2 embed -ldflags "-X main.version=${{ needs.version.outputs.version }}"
      - name: Verify binary
        shell: bash
        run: |
          echo "Build output:"
          ls -la build/bin/ || true
          test -f build/bin/LineSolv.exe || { echo "Binary not found"; exit 1; }
      - name: Rename artifacts
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mv "build/bin/LineSolv.exe" "LineSolv-${VERSION}-windows-amd64.exe"
          mv "build/bin/LineSolv-amd64-installer.exe" "LineSolv-${VERSION}-windows-amd64-installer.exe" 2>/dev/null || true
      - name: Generate checksums
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          if [ -f "LineSolv-${VERSION}-windows-amd64-installer.exe" ]; then
            sha256sum "LineSolv-${VERSION}-windows-amd64.exe" "LineSolv-${VERSION}-windows-amd64-installer.exe" > "SHA256SUMS-windows-${VERSION}"
          else
            sha256sum "LineSolv-${VERSION}-windows-amd64.exe" > "SHA256SUMS-windows-${VERSION}"
          fi
      - name: Upload
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Uploading Windows artifacts..."
          ls -la "LineSolv-${VERSION}-windows-amd64.exe" "SHA256SUMS-windows-${VERSION}"
          INSTALLER=""
          if [ -f "LineSolv-${VERSION}-windows-amd64-installer.exe" ]; then
            INSTALLER="LineSolv-${VERSION}-windows-amd64-installer.exe"
            ls -la "${INSTALLER}"
          fi
          gh release upload "${VERSION}" \
            "LineSolv-${VERSION}-windows-amd64.exe" \
            ${INSTALLER} \
            "SHA256SUMS-windows-${VERSION}" \
            --clobber
          echo "Windows upload complete"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    needs: [version, release, linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Combine checksums, sign, build update manifest, finalize notes
        run: |
          set -euo pipefail
          VERSION="${{ needs.version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${VERSION}"

          # --- Pull the per-OS checksum files back down and merge them ---
          mkdir -p assets && cd assets
          gh release download "${VERSION}" --pattern "SHA256SUMS-*"
          cd ..
          cat assets/SHA256SUMS-* | sort -k2 > "SHA256SUMS-${VERSION}"
          gh release upload "${VERSION}" "SHA256SUMS-${VERSION}" --clobber

          # --- Sign SHA256SUMS with Ed25519 ---
          if [ -n "${ED25519_PRIVATE_KEY:-}" ]; then
            echo "${ED25519_PRIVATE_KEY}" > /tmp/signing_key.pem
            cat > /tmp/sign.go << 'GOEOF'
          package main

          import (
            "crypto/ed25519"
            "encoding/pem"
            "fmt"
            "os"
          )

          func main() {
            if len(os.Args) != 3 {
              fmt.Fprintf(os.Stderr, "usage: sign <key.pem> <file>\n")
              os.Exit(1)
            }
            keyData, err := os.ReadFile(os.Args[1])
            if err != nil {
              fmt.Fprintf(os.Stderr, "read key: %v\n", err)
              os.Exit(1)
            }
            block, _ := pem.Decode(keyData)
            if block == nil {
              fmt.Fprintf(os.Stderr, "decode PEM: failed\n")
              os.Exit(1)
            }
            priv := ed25519.PrivateKey(block.Bytes)
            data, err := os.ReadFile(os.Args[2])
            if err != nil {
              fmt.Fprintf(os.Stderr, "read data: %v\n", err)
              os.Exit(1)
            }
            sig := ed25519.Sign(priv, data)
            if err := os.WriteFile(os.Args[2]+".sig", sig, 0644); err != nil {
              fmt.Fprintf(os.Stderr, "write sig: %v\n", err)
              os.Exit(1)
            }
            fmt.Printf("Signed %s -> %s.sig\n", os.Args[2], os.Args[2])
          }
          GOEOF
            go run /tmp/sign.go /tmp/signing_key.pem "SHA256SUMS-${VERSION}"
            rm -f /tmp/signing_key.pem /tmp/sign.go
            gh release upload "${VERSION}" "SHA256SUMS-${VERSION}.sig" --clobber
            echo "SHA256SUMS signed successfully"
          else
            echo "WARNING: ED25519_PRIVATE_KEY not set, skipping signing"
          fi

          # Exact-match sha lookup (avoids the classic "amd64 matches amd64.dmg" substring bug)
          sha_for() {
            awk -v f="$1" '{fn=$NF; sub(/^\*/,"",fn); if (fn==f) {print $1; exit}}' "SHA256SUMS-${VERSION}"
          }

          # --- Self-update manifest: a stable, small JSON file update clients can poll ---
          cat > "latest.json" <<EOF
          {
            "version": "${VERSION}",
            "notes_url": "https://github.com/${REPO}/releases/tag/${VERSION}",
            "platforms": {
              "linux-amd64": {
                "url": "${BASE}/LineSolv-${VERSION}-linux-amd64",
                "sha256": "$(sha_for "LineSolv-${VERSION}-linux-amd64")"
              },
              "darwin-arm64": {
                "url": "${BASE}/LineSolv-${VERSION}-darwin-arm64",
                "sha256": "$(sha_for "LineSolv-${VERSION}-darwin-arm64")"
              },
              "darwin-amd64": {
                "url": "${BASE}/LineSolv-${VERSION}-darwin-amd64",
                "sha256": "$(sha_for "LineSolv-${VERSION}-darwin-amd64")"
              },
              "windows-amd64": {
                "url": "${BASE}/LineSolv-${VERSION}-windows-amd64.exe",
                "sha256": "$(sha_for "LineSolv-${VERSION}-windows-amd64.exe")"
              }
            }
          }
          EOF
          gh release upload "${VERSION}" "latest.json" --clobber

          # --- Append a Downloads/verification table to the auto-generated notes ---
          gh release view "${VERSION}" --json body -q .body > current-notes.md
          {
            cat current-notes.md
            echo
            echo "## Downloads"
            echo
            echo "| File | SHA256 |"
            echo "|---|---|"
            while read -r sum file; do
              echo "| \`${file}\` | \`${sum}\` |"
            done < "SHA256SUMS-${VERSION}"
          } > final-notes.md
          gh release edit "${VERSION}" --notes-file final-notes.md
          echo "Release notes finalized for ${VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
