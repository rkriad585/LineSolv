name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -tags "webkit2_41" -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Package .deb
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          PKG="linesolv_${VERSION}_amd64"

          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"

          cp build/bin/LineSolv "${PKG}/usr/bin/linesolv"
          # Use appicon directly (GitHub runners don't have ImageMagick for resize)
          cp build/appicon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/linesolv.png"

          cat > "${PKG}/DEBIAN/control" <<ENDCTRL
          Package: linesolv
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0, libc6
          Maintainer: rkriad585 <rkriad585@gmail.com>
          Description: Natural-language desktop calculator
           LineSolv is a cross-platform desktop calculator that understands
           natural language input, supports unit conversion, variables,
           and community plugins.
          ENDCTRL

          cat > "${PKG}/usr/share/applications/linesolv.desktop" <<ENDDESK
          [Desktop Entry]
          Type=Application
          Name=LineSolv
          Exec=linesolv
          Icon=linesolv
          Categories=Utility;Calculator;
          Terminal=false
          ENDDESK

          dpkg-deb --build "${PKG}"
          mv "${PKG}.deb" "linesolv-${VERSION}-linux-amd64.deb"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: linesolv-*.deb

  macos:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          GOARCH=${{ matrix.arch }} \
          wails build -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Package .app
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARCH="${{ matrix.arch }}"
          APP="LineSolv.app"
          rm -rf "${APP}"
          mkdir -p "${APP}/Contents/MacOS"
          mkdir -p "${APP}/Contents/Resources"

          cp build/bin/LineSolv "${APP}/Contents/MacOS/LineSolv"

          # Write a clean Info.plist (the source template uses Go placeholders)
          cat > "${APP}/Contents/Info.plist" <<ENDPLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleName</key>
            <string>LineSolv</string>
            <key>CFBundleExecutable</key>
            <string>LineSolv</string>
            <key>CFBundleIdentifier</key>
            <string>com.linesolv.app</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleIconFile</key>
            <string>iconfile</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSHumanReadableCopyright</key>
            <string>LineSolv (c) 2026 rkriad585</string>
          </dict>
          </plist>
          ENDPLIST

          cp build/appicon.png "${APP}/Contents/Resources/iconfile.png"

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ARCH="${{ matrix.arch }}"
          hdiutil create -volname "LineSolv" \
            -srcfolder LineSolv.app \
            -ov -format UDZO \
            "LineSolv-${VERSION}-darwin-${ARCH}.dmg"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: LineSolv-*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build + NSIS installer
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          wails build -nsis -webview2 embed -ldflags "-X main.version=${{ github.ref_name }}"

      - name: Rename artifacts
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mv "build/bin/LineSolv.exe" "LineSolv-${VERSION}-windows-amd64.exe"
          # NSIS installer may be in build/bin
          mv "build/bin/LineSolv-amd64-installer.exe" "LineSolv-${VERSION}-windows-amd64-installer.exe" 2>/dev/null || true
          # Also check parent directory (wails v2 sometimes puts it there)
          mv "LineSolv-amd64-installer.exe" "LineSolv-${VERSION}-windows-amd64-installer.exe" 2>/dev/null || true

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LineSolv-*-windows-amd64.exe
            LineSolv-*-windows-amd64-installer.exe
